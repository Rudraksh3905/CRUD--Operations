<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container text-white">
        <h1 class="text-center text-white">Registration Form</h1>
        
        <input type="text" class="form-control mb-2" id="Name" placeholder="Enter Name">
        <input type="text" class="form-control mb-2" id="Phone" placeholder="Enter Phone">
        <input type="text" class="form-control mb-2" id="City" placeholder="Enter City">
        <button class="btn btn-primary mb-2" onclick="Save()">Save</button>
        <button class="btn btn-danger mb-2" onclick="DeleteAll()">Delete All</button>
        <button class="btn btn-primary mb-2" onclick="Update()">Update</button>
        <table class="table table-bordered table-striped table-hover">
            <thead>
                <th>Name</th>
                <th>Phone</th>
                <th>City</th>
                <th>Action</th>
            </thead>
            <tbody id="tbdy">

            </tbody>
        </table>
    </div>

    <script>
        function Save(){
           var name = document.getElementById("Name").value
           var phone = document.getElementById("Phone").value
           var city = document.getElementById("City").value
        
           var row = document.createElement("tr")
           var cell = document.createElement("td")
           var cell1 = document.createElement("td")
           var cell2 = document.createElement("td")
           var cell3 = document.createElement("td")

           cell.innerHTML=name
           cell1.innerHTML=phone
           cell2.innerHTML=city

           var deletebtn = document.createElement("button")
           deletebtn.innerHTML="Delete"
           deletebtn.className="btn btn-danger"
           deletebtn.setAttribute("onclick","Del(this)")
           cell3.append(deletebtn)


           var editbtn = document.createElement("button")
           editbtn.innerHTML="Edit"
           editbtn.className="btn btn-primary"
           editbtn.setAttribute("onclick","Edit(this)")
           cell3.append(editbtn)

           row.append(cell)
           row.append(cell1)
           row.append(cell2)
           row.append(cell3)
           document.getElementById("tbdy").append(row)
        }

        function Del(button){
            var row = button.parentNode.parentNode
            row.style.display="none"            
        }
        function DeleteAll(){
            document.getElementById("tbdy").innerHTML=""
        }
        var data = ""
        function Edit(button){
            var row = button.parentNode.parentNode
            data = row
            var childs = row.childNodes

            document.getElementById("Name").value=childs[0].innerHTML
            document.getElementById("Phone").value=childs[1].innerHTML
            document.getElementById("City").value=childs[2].innerHTML
    
        }

        function Update(){
         var name = document.getElementById("Name").value
         var phone = document.getElementById("Phone").value
         var city = document.getElementById("City").value
       
         
         data.childNodes[0].innerHTML=name
         data.childNodes[1].innerHTML=phone
         data.childNodes[2].innerHTML=city
             
        }
    </script>
</body>
</html>
