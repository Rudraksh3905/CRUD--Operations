<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="script.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark">

    <div class="container text-white">
        <h1 class="text-center">Registration Form</h1>

        <input type="text" class="form-control mb-2" id="Name" placeholder="Enter Name">
        <input type="text" class="form-control mb-2" id="Phone" placeholder="Enter Phone">
        <input type="text" class="form-control mb-2" id="City" placeholder="Enter City">

        <button class="btn btn-primary mb-2" onclick="Save()">Save</button>
        <button class="btn btn-danger mb-2" onclick="DeleteAll()">Delete All</button>
        <button class="btn btn-warning mb-2" onclick="Update()">Update</button>

        <table class="table table-bordered table-striped table-hover mt-3">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tbdy"></tbody>
        </table>
    </div>
    <script src="script.js"></script>

</body>
</html>
